<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Lounge — RaffinAus Equity</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF4B12;
    --gold: #C8922A;
    --blue: #3B5BDB;
    --dark: #1a1a1a;
    --gray-500: #666;
    --gray-400: #999;
    --gray-200: #e4e4e4;
    --gray-100: #f7f7f7;
    --white: #fff;
    --border: #ebebeb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f4f4f4; color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }

  /* NAV */
  nav { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-inner { max-width: 1160px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 20px; }
  .logo { font-size: 20px; font-weight: 800; color: #8B1A1A; letter-spacing: -0.5px; text-decoration: none; font-style: italic; flex-shrink: 0; }
  .logo span { color: var(--dark); font-style: normal; font-size: 13px; font-weight: 500; margin-left: 6px; vertical-align: middle; }
  .nav-divider { width: 1px; height: 28px; background: var(--gray-200); flex-shrink: 0; }
  .nav-spacer { flex: 1; }
  .nav-cta { background: var(--dark); color: var(--white); border: none; padding: 9px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; white-space: nowrap; }

  /* FILTER */
  .filter-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 0; }
  .filter-inner { max-width: 1160px; margin: 0 auto; padding: 0 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-select { border: 1.5px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; font-family: inherit; color: var(--gray-500); background: white; cursor: pointer; outline: none; }
  .filter-select:focus { border-color: var(--gold); }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap input { width: 100%; border: 1.5px solid var(--border); border-radius: 6px; padding: 8px 12px 8px 34px; font-size: 13px; font-family: inherit; outline: none; }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray-400); }

  /* MAIN */
  .main { max-width: 1160px; margin: 0 auto; padding: 24px; flex: 1; width: 100%; }
  .no-result { text-align: center; padding: 60px 0; color: var(--gray-400); font-size: 15px; }

  /* CARDS */
  .deals-list { display: flex; flex-direction: column; gap: 14px; }

  .card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; display: flex; overflow: hidden; transition: box-shadow 0.18s, border-color 0.18s; }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-color: #d8d8d8; }

  .card-thumb { width: 120px; min-width: 120px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 40px; }

  .card-body { flex: 1; padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-meta { display: flex; align-items: center; gap: 8px; }
  .deal-no { font-size: 11px; color: var(--gray-400); font-weight: 500; }
  .badge-new { background: var(--gold); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
  .card-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-contact { background: var(--dark); color: white; border: none; padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; white-space: nowrap; }

  .card-title { font-size: 16px; font-weight: 700; color: var(--dark); line-height: 1.4; letter-spacing: -0.3px; }
  .card-desc { font-size: 13px; color: var(--gray-500); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .card-stats { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .stat { flex: 1; padding: 10px 14px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-label { font-size: 10px; color: var(--gray-400); font-weight: 500; margin-bottom: 3px; }
  .stat-value { font-size: 14px; font-weight: 700; color: var(--dark); }
  .stat-value.price { color: var(--orange); }

  /* FOOTER */
  footer { background: var(--dark); color: #aaa; padding: 32px 0; margin-top: 40px; }
  .footer-inner { max-width: 1160px; margin: 0 auto; padding: 0 24px; display: flex; flex-direction: column; gap: 6px; }
  .footer-company { font-size: 15px; font-weight: 700; color: white; margin-bottom: 6px; }
  .footer-info { font-size: 13px; line-height: 1.8; }
  .footer-info a { color: #aaa; text-decoration: none; }
  .footer-info a:hover { color: white; }
  .footer-copy { font-size: 12px; color: #666; margin-top: 12px; }

  @media (max-width: 700px) {
    .card-thumb { width: 80px; min-width: 80px; font-size: 30px; }
    .card-stats { flex-wrap: wrap; }
    .stat { min-width: 45%; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="#" class="logo">RaffinAus<span>Deal Lounge</span></a>
    <div class="nav-spacer"></div>
    <button class="nav-cta" onclick="document.getElementById('contactModal').style.display='flex'">상담하기</button>
  </div>
</nav>

<div class="filter-bar">
  <div class="filter-inner">
    <select class="filter-select" id="filterIndustry" onchange="filterDeals()">
      <option value="">전체 업종</option>
      <option value="제조">제조업</option>
      <option value="IT">IT/소프트웨어</option>
      <option value="유통">유통/도매</option>
      <option value="식품">음식/F&B</option>
      <option value="서비스">서비스업</option>
      <option value="의료">의료/헬스케어</option>
      <option value="물류">물류/운송</option>
      <option value="건설">건설/부동산</option>
      <option value="교육">교육</option>
    </select>
    <select class="filter-select" id="filterRegion" onchange="filterDeals()">
      <option value="">전체 지역</option>
      <option value="서울">서울</option>
      <option value="경기">경기도</option>
      <option value="인천">인천</option>
      <option value="부산">부산</option>
      <option value="대구">대구</option>
      <option value="경상">경상도</option>
    </select>
    <select class="filter-select" id="filterPrice" onchange="filterDeals()">
      <option value="">희망가격 전체</option>
      <option value="5">5억 미만</option>
      <option value="10">5억~10억</option>
      <option value="30">10억~30억</option>
      <option value="100">30억~100억</option>
      <option value="999">100억 이상</option>
    </select>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="업종, 키워드로 검색..." oninput="filterDeals()">
    </div>
  </div>
</div>

<main class="main">
  <div class="deals-list" id="dealsList"></div>
  <div class="no-result" id="noResult" style="display:none">조건에 맞는 매물이 없습니다.</div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <div class="footer-company">라피너스에쿼티 주식회사</div>
    <div class="footer-info">
      서울시 강남구 강남대로 310 유니온센터 2004호<br>
      Tel. <a href="tel:0251500094">02-515-0094</a> &nbsp;|&nbsp;
      Email. <a href="mailto:kimsw@rfns.co.kr">kimsw@rfns.co.kr</a>
    </div>
    <div class="footer-copy">© 2025 RaffinAus Equity. All rights reserved.</div>
  </div>
</footer>

<script>
const deals = [
  {
    no: 4146, isNew: true, emoji: "🏢",
    title: "감정가 23억 포트폴리오 보유 법인, 5억에 지분 100% 매각",
    desc: "서울 소재 법인으로 부동산 포트폴리오 보유. 지분 100% 매각으로 즉시 경영권 이전 가능. 장부가 대비 저평가된 매물.",
    price: "5~5억", priceVal: 5,
    revenue: "2.6억", profit: "0.5억", region: "서울시",
    industry: "건설", regionKey: "서울"
  },
  {
    no: 3945, isNew: true, emoji: "🏨",
    title: "강남구 삼성동 호텔 객실 18개 양도양수",
    desc: "강남 핵심 상권 삼성동 위치. 객실 18개 운영 중. 월숙박·레지던스 복합 운영. OTA 수수료 수익 안정적.",
    price: "5~7억", priceVal: 7,
    revenue: "0억", profit: "0억", region: "서울시",
    industry: "서비스", regionKey: "서울"
  },
  {
    no: 264, isNew: false, emoji: "♻️",
    title: "친환경 재활용 플라스틱 유통",
    desc: "ESG 테마 수혜 기업. 재생 플라스틱·PVC 컴파운드 유통. 탄소배출권 연계 사업 가능.",
    price: "5~5억", priceVal: 5,
    revenue: "20억", profit: "2억", region: "서울시",
    industry: "유통", regionKey: "서울"
  },
  {
    no: 4290, isNew: true, emoji: "💻",
    title: "[사업 매각] 국내 최고 AI 바이브코딩 솔루션",
    desc: "AI 코딩 에이전트 기반 B2B SaaS. 고성장 시장 내 선도적 포지션. 구독형 매출로 안정적 현금흐름.",
    price: "10~10억", priceVal: 10,
    revenue: "29.4억", profit: "0.2억", region: "경기도",
    industry: "IT", regionKey: "경기"
  },
  {
    no: 2015, isNew: false, emoji: "🌿",
    title: "홍삼 및 건강기능식품 브랜드 매각 [일부 사업부 / 브랜드 매각]",
    desc: "홍삼·건강기능식품 온라인 유통 브랜드. OEM 생산 구조로 고정비 최소화.",
    price: "20~20억", priceVal: 20,
    revenue: "17억", profit: "6억", region: "서울시",
    industry: "식품", regionKey: "서울"
  },
  {
    no: 4378, isNew: false, emoji: "🥬",
    title: "B2B 식자재 유통·도매, 연매출 40억원대, 자체 물류 100% 운영",
    desc: "대구·경북 기반 B2B 식자재 유통. 자체 냉동냉장 창고 및 물류 보유. 원스톱 공급 체계.",
    price: "12~12억", priceVal: 12,
    revenue: "46.6억", profit: "1.7억", region: "경상북도",
    industry: "유통", regionKey: "경상"
  }
];

function cardHTML(d) {
  return `
    <div class="card">
      <div class="card-thumb">${d.emoji}</div>
      <div class="card-body">
        <div class="card-header">
          <div class="card-meta">
            <span class="deal-no">#${d.no}</span>
            ${d.isNew ? '<span class="badge-new">● New Listing</span>' : ''}
          </div>
          <div class="card-actions">
            <button class="btn-contact" onclick="location.href='mailto:kimsw@rfns.co.kr?subject=매물 문의 #${d.no}'">문의하기 →</button>
          </div>
        </div>
        <div class="card-title">${d.title}</div>
        <div class="card-desc">${d.desc}</div>
        <div class="card-stats">
          <div class="stat"><div class="stat-label">매각 희망 금액</div><div class="stat-value price">${d.price}</div></div>
          <div class="stat"><div class="stat-label">매출</div><div class="stat-value">${d.revenue}</div></div>
          <div class="stat"><div class="stat-label">영업이익</div><div class="stat-value">${d.profit}</div></div>
          <div class="stat"><div class="stat-label">지역</div><div class="stat-value">${d.region}</div></div>
        </div>
      </div>
    </div>`;
}

function filterDeals() {
  const industry = document.getElementById('filterIndustry').value;
  const region = document.getElementById('filterRegion').value;
  const price = document.getElementById('filterPrice').value;
  const keyword = document.getElementById('searchInput').value.toLowerCase();

  const priceRanges = { '5': [0,5], '10': [5,10], '30': [10,30], '100': [30,100], '999': [100,9999] };

  const filtered = deals.filter(d => {
    if (industry && !d.industry.includes(industry)) return false;
    if (region && !d.regionKey.includes(region)) return false;
    if (price) {
      const [min, max] = priceRanges[price];
      if (d.priceVal < min || d.priceVal > max) return false;
    }
    if (keyword && !d.title.toLowerCase().includes(keyword) && !d.desc.toLowerCase().includes(keyword)) return false;
    return true;
  });

  const list = document.getElementById('dealsList');
  const noResult = document.getElementById('noResult');
  list.innerHTML = filtered.map(cardHTML).join('');
  noResult.style.display = filtered.length === 0 ? 'block' : 'none';
}

filterDeals();
</script>
</body>
</html>
