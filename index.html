<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Lounge — RaffinAus Equity</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF4B12;
    --gold: #C8922A;
    --blue: #3B5BDB;
    --dark: #1a1a1a;
    --gray-500: #666;
    --gray-400: #999;
    --gray-200: #e4e4e4;
    --gray-100: #f7f7f7;
    --white: #fff;
    --border: #ebebeb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f4f4f4; color: var(--dark); }

  nav {
    background: var(--white); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .nav-inner {
    max-width: 1160px; margin: 0 auto; padding: 0 24px;
    height: 64px; display: flex; align-items: center; gap: 20px;
  }
  .logo img { height: 38px; display: block; }
  .nav-divider { width: 1px; height: 28px; background: var(--gray-200); flex-shrink: 0; }
  .site-name { font-size: 15px; font-weight: 700; color: var(--dark); white-space: nowrap; letter-spacing: -0.3px; }
  .nav-links { display: flex; gap: 24px; list-style: none; flex: 1; }
  .nav-links a { text-decoration: none; font-size: 14px; font-weight: 500; color: var(--gray-500); }
  .nav-links a.active { color: var(--dark); font-weight: 700; }
  .dot { display: inline-block; width: 6px; height: 6px; background: var(--orange); border-radius: 50%; margin-left: 2px; vertical-align: super; }
  .nav-cta { background: var(--dark); color: var(--white); border: none; padding: 9px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; white-space: nowrap; }

  .filter-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 0; }
  .filter-inner { max-width: 1160px; margin: 0 auto; padding: 0 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .filter-select { border: 1.5px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; font-family: inherit; color: var(--gray-500); background: white; cursor: pointer; outline: none; }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap input { width: 100%; border: 1.5px solid var(--border); border-radius: 6px; padding: 8px 12px 8px 34px; font-size: 13px; font-family: inherit; outline: none; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: 14px; }
  .filter-btn { background: var(--dark); color: white; border: none; padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }

  .main { max-width: 1160px; margin: 0 auto; padding: 24px; }
  .result-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .result-count { font-size: 13px; color: var(--gray-400); }
  .result-count strong { color: var(--orange); font-weight: 700; }
  .sort-select { border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 12px; font-family: inherit; color: var(--gray-500); background: white; cursor: pointer; }

  .deals-list { display: flex; flex-direction: column; gap: 14px; }

  .card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; display: flex; overflow: hidden; transition: box-shadow 0.18s, border-color 0.18s; cursor: pointer; }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-color: #d8d8d8; }

  .card-thumb { width: 155px; min-width: 155px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 44px; }

  .card-body { flex: 1; padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-meta { display: flex; align-items: center; gap: 8px; }
  .deal-no { font-size: 11px; color: var(--gray-400); font-weight: 500; }
  .badge-new { background: var(--gold); color: white; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
  .card-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-unlock { background: var(--gold); color: white; border: none; padding: 7px 13px; border-radius: 6px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; white-space: nowrap; }
  .btn-view { background: var(--blue); color: white; border: none; padding: 7px 13px; border-radius: 6px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; white-space: nowrap; }

  .card-title { font-size: 16px; font-weight: 700; color: var(--dark); line-height: 1.4; letter-spacing: -0.3px; }
  .card-desc { font-size: 13px; color: var(--gray-500); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .card-stats { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .stat { flex: 1; padding: 10px 14px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-label { font-size: 10px; color: var(--gray-400); font-weight: 500; margin-bottom: 3px; }
  .stat-value { font-size: 14px; font-weight: 700; color: var(--dark); }
  .stat-value.price { color: var(--orange); }

  .card-perf { display: flex; gap: 16px; }
  .perf-item { font-size: 11px; color: var(--gray-400); }
  .up { color: #2f9e44; font-weight: 600; }
  .na { color: var(--gray-400); }

  .pagination { display: flex; justify-content: center; gap: 6px; margin-top: 32px; }
  .page-btn { width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 6px; background: white; font-size: 13px; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--gray-500); }
  .page-btn.active { background: var(--dark); border-color: var(--dark); color: white; font-weight: 700; }
</style>
</head>

      <div class="card-desc">${d.desc}</div>
      <div class="card-stats">
        <div class="stat"><div class="stat-label">매각 희망 금액</div><div class="stat-value price">${d.price}</div></div>
        <div class="stat"><div class="stat-label">매출</div><div class="stat-value">${d.revenue}</div></div>
        <div class="stat"><div class="stat-label">영업이익</div><div class="stat-value">${d.profit}</div></div>
        <div class="stat"><div class="stat-label">지역</div><div class="stat-value">${d.region}</div></div>
      </div>
      <div class="card-perf">
        <span class="perf-item">영업이익 (12개월) <span class="${d.pt==='N/A'?'na':'up'}">${d.pt}</span></span>
        <span class="perf-item">매출 (12개월) <span class="${d.rt==='N/A'?'na':'up'}">${d.rt}</span></span>
      </div>
    </div>
  </div>
`).join('');

document.querySelectorAll('.page-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    if (this.textContent !== '‹' && this.textContent !== '›') {
      document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    }
  });
});
</script>
</body>
</html>
